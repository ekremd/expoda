<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yakında</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0a0f;
      --accent: #6c63ff;
      --accent2: #ff6584;
      --text: #f0f0f5;
      --muted: #888899;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Gradient blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      pointer-events: none;
      animation: float 12s ease-in-out infinite;
    }
    .blob-1 {
      width: 520px; height: 520px;
      background: var(--accent);
      top: -120px; left: -120px;
      animation-delay: 0s;
    }
    .blob-2 {
      width: 400px; height: 400px;
      background: var(--accent2);
      bottom: -100px; right: -80px;
      animation-delay: -6s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50%       { transform: translateY(40px) scale(1.06); }
    }

    /* Main card */
    .card {
      text-align: center;
      padding: 3rem 2.5rem;
      max-width: 620px;
      width: 90%;
      position: relative;
      z-index: 1;
    }

    .logo {
      font-size: 2.8rem;
      font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }

    .tagline {
      font-size: 1.05rem;
      color: var(--muted);
      margin-bottom: 3rem;
      letter-spacing: 0.04em;
    }

    h1 {
      font-size: clamp(2.4rem, 6vw, 3.8rem);
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 1rem;
      letter-spacing: -1.5px;
    }

    h1 span {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .desc {
      font-size: 1.1rem;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 3rem;
    }

    /* Countdown */
    .countdown {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin-bottom: 3rem;
      flex-wrap: wrap;
    }

    .unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 72px;
    }

    .num {
      font-size: 2.8rem;
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-variant-numeric: tabular-nums;
    }

    .label {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: 0.4rem;
    }

    .divider {
      font-size: 2.4rem;
      font-weight: 300;
      color: var(--muted);
      align-self: flex-start;
      padding-top: 0.1rem;
      opacity: 0.4;
    }

    /* Email form */
    .notify-label {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 0.75rem;
      letter-spacing: 0.04em;
    }

    .form {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 2.5rem;
    }

    .form input[type="email"] {
      flex: 1;
      min-width: 220px;
      max-width: 300px;
      padding: 0.8rem 1.2rem;
      border-radius: 999px;
      border: 1.5px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .form input[type="email"]:focus {
      border-color: var(--accent);
    }

    .form button {
      padding: 0.8rem 1.8rem;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      transition: opacity 0.2s, transform 0.15s;
    }

    .form button:hover {
      opacity: 0.88;
      transform: translateY(-1px);
    }

    .success-msg {
      display: none;
      color: #7effa0;
      font-size: 0.9rem;
      margin-top: 0.5rem;
    }

    /* Social */
    .social {
      display: flex;
      justify-content: center;
      gap: 1rem;
    }

    .social a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.12);
      color: var(--muted);
      text-decoration: none;
      font-size: 1rem;
      transition: border-color 0.2s, color 0.2s;
    }

    .social a:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Progress bar */
    .progress-wrap {
      margin-bottom: 2.5rem;
    }
    .progress-info {
      display: flex;
      justify-content: space-between;
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }
    .bar {
      height: 5px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      width: 72%;
      animation: grow 1.4s cubic-bezier(.4,0,.2,1) both;
    }
    @keyframes grow {
      from { width: 0; }
      to   { width: 72%; }
    }
  </style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="card">
    <div class="logo">expoda</div>
    <div class="tagline">Yeni bir şey geliyor</div>

    <h1>Çok Yakında <span>Buradayız</span></h1>
    <p class="desc">
      Harika bir şey üzerinde çalışıyoruz.<br />
      Hazır olduğunda seni haberdar edelim.
    </p>

    <!-- Countdown -->
    <div class="countdown" id="countdown">
      <div class="unit"><span class="num" id="days">00</span><span class="label">Gün</span></div>
      <div class="divider">:</div>
      <div class="unit"><span class="num" id="hours">00</span><span class="label">Saat</span></div>
      <div class="divider">:</div>
      <div class="unit"><span class="num" id="mins">00</span><span class="label">Dakika</span></div>
      <div class="divider">:</div>
      <div class="unit"><span class="num" id="secs">00</span><span class="label">Saniye</span></div>
    </div>

    <!-- Progress -->
    <div class="progress-wrap">
      <div class="progress-info"><span>Geliştirme ilerlememiz</span><span>%72</span></div>
      <div class="bar"><div class="bar-fill"></div></div>
    </div>

    <!-- Email -->
    <p class="notify-label">Haberdar ol — erken erişim listesine katıl</p>
    <div class="form">
      <input type="email" id="email" placeholder="e-posta adresin" />
      <button onclick="subscribe()">Bildir</button>
    </div>
    <p class="success-msg" id="success">Teşekkürler! Haber verir biz. 🎉</p>

    <!-- Social -->
    <div class="social">
      <a href="#" title="Twitter / X" aria-label="Twitter">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
          <path d="M12.6.75h2.454l-5.36 6.142L16 15.25h-4.937l-3.867-5.07-4.425 5.07H.316l5.733-6.57L0 .75h5.063l3.495 4.633L12.601.75Zm-.86 13.028h1.36L4.323 2.145H2.865z"/>
        </svg>
      </a>
      <a href="#" title="Instagram" aria-label="Instagram">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
          <path d="M8 0C5.829 0 5.556.01 4.703.048 3.85.088 3.269.222 2.76.42a3.917 3.917 0 0 0-1.417.923A3.927 3.927 0 0 0 .42 2.76C.222 3.268.087 3.85.048 4.7.01 5.555 0 5.827 0 8.001c0 2.172.01 2.444.048 3.297.04.852.174 1.433.372 1.942.205.526.478.972.923 1.417.444.445.89.719 1.416.923.51.198 1.09.333 1.942.372C5.555 15.99 5.827 16 8 16s2.444-.01 3.298-.048c.851-.04 1.434-.174 1.943-.372a3.916 3.916 0 0 0 1.416-.923c.445-.445.718-.891.923-1.417.197-.509.332-1.09.372-1.942C15.99 10.445 16 10.173 16 8s-.01-2.445-.048-3.299c-.04-.851-.175-1.433-.372-1.941a3.926 3.926 0 0 0-.923-1.417A3.911 3.911 0 0 0 13.24.42c-.51-.198-1.092-.333-1.943-.372C10.443.01 10.172 0 7.998 0h.003zm-.717 1.442h.718c2.136 0 2.389.007 3.232.046.78.035 1.204.166 1.486.275.373.145.64.319.92.599.28.28.453.546.598.92.11.281.24.705.275 1.485.039.843.047 1.096.047 3.231s-.008 2.389-.047 3.232c-.035.78-.166 1.203-.275 1.485a2.47 2.47 0 0 1-.599.919c-.28.28-.546.453-.92.598-.28.11-.704.24-1.485.276-.843.038-1.096.047-3.232.047s-2.39-.009-3.233-.047c-.78-.036-1.203-.166-1.485-.276a2.478 2.478 0 0 1-.92-.598 2.48 2.48 0 0 1-.6-.92c-.109-.281-.24-.705-.275-1.485-.038-.843-.046-1.096-.046-3.233 0-2.136.008-2.388.046-3.231.036-.78.166-1.204.276-1.486.145-.373.319-.64.599-.92.28-.28.546-.453.92-.598.282-.11.705-.24 1.485-.276.738-.034 1.024-.044 2.515-.045v.002zm4.988 1.328a.96.96 0 1 0 0 1.92.96.96 0 0 0 0-1.92zm-4.27 1.122a4.109 4.109 0 1 0 0 8.217 4.109 4.109 0 0 0 0-8.217zm0 1.441a2.667 2.667 0 1 1 0 5.334 2.667 2.667 0 0 1 0-5.334z"/>
        </svg>
      </a>
      <a href="#" title="LinkedIn" aria-label="LinkedIn">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
          <path d="M0 1.146C0 .513.526 0 1.175 0h13.65C15.474 0 16 .513 16 1.146v13.708c0 .633-.526 1.146-1.175 1.146H1.175C.526 16 0 15.487 0 14.854V1.146zm4.943 12.248V6.169H2.542v7.225h2.401zm-1.2-8.212c.837 0 1.358-.554 1.358-1.248-.015-.709-.52-1.248-1.342-1.248-.822 0-1.359.54-1.359 1.248 0 .694.521 1.248 1.327 1.248h.016zm4.908 8.212V9.359c0-.216.016-.432.08-.586.173-.431.568-.878 1.232-.878.869 0 1.216.662 1.216 1.634v3.865h2.401V9.25c0-2.22-1.184-3.252-2.764-3.252-1.274 0-1.845.7-2.165 1.193v.025h-.016a5.54 5.54 0 0 1 .016-.025V6.169h-2.4c.03.678 0 7.225 0 7.225h2.4z"/>
        </svg>
      </a>
    </div>
  </div>

  <script>
    // Countdown — hedef tarihi burada değiştir
    const TARGET = new Date('2026-06-01T00:00:00');

    function pad(n) { return String(n).padStart(2, '0'); }

    function tick() {
      const diff = TARGET - Date.now();
      if (diff <= 0) {
        document.getElementById('days').textContent  = '00';
        document.getElementById('hours').textContent = '00';
        document.getElementById('mins').textContent  = '00';
        document.getElementById('secs').textContent  = '00';
        return;
      }
      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff % 86400000) / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);
      document.getElementById('days').textContent  = pad(d);
      document.getElementById('hours').textContent = pad(h);
      document.getElementById('mins').textContent  = pad(m);
      document.getElementById('secs').textContent  = pad(s);
    }

    tick();
    setInterval(tick, 1000);

    // Email subscribe (demo)
    function subscribe() {
      const email = document.getElementById('email').value.trim();
      if (!email || !email.includes('@')) {
        document.getElementById('email').focus();
        return;
      }
      document.querySelector('.form').style.display = 'none';
      document.querySelector('.notify-label').style.display = 'none';
      document.getElementById('success').style.display = 'block';
    }
  </script>
</body>
</html>
